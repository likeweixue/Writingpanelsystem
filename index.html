<script>
    // ========== 静默所有备份提示 ==========
(function silenceBackup() {
    var originalAlert = window.alert;
    window.alert = function(message) {
        if (message && typeof message === 'string') {
            var keywords = ['备份', 'backup', '保存成功', '恢复', '已保存'];
            for (var i = 0; i < keywords.length; i++) {
                if (message.indexOf(keywords[i]) !== -1) {
                    console.log('[静默]', message);
                    return;
                }
            }
        }
        originalAlert(message);
    };
    console.log('✅ 备份提示已静默');
})();
// 图片压缩函数
function compressImage(file, maxWidth, maxHeight, quality, callback) {
    var reader = new FileReader();
    reader.onload = function(e) {
        var img = new Image();
        img.onload = function() {
            var width = img.width;
            var height = img.height;
            var ratio = 1;
            if (width > maxWidth) ratio = maxWidth / width;
            else if (height > maxHeight) ratio = maxHeight / height;
            var newWidth = width * ratio;
            var newHeight = height * ratio;
            var canvas = document.createElement("canvas");
            canvas.width = newWidth;
            canvas.height = newHeight;
            var ctx = canvas.getContext("2d");
            ctx.drawImage(img, 0, 0, newWidth, newHeight);
            var compressedDataUrl = canvas.toDataURL("image/jpeg", quality);
            callback(compressedDataUrl);
        };
        img.src = e.target.result;
    };
    reader.readAsDataURL(file);
}

function compressAndCreateBook(name, desc, file) {
    if (file && file.size > 1024 * 1024) {
        compressImage(file, 400, 300, 0.6, function(compressedDataUrl) {
            createBookWithData(name, desc, compressedDataUrl);
        });
    } else if (file) {
        var reader = new FileReader();
        reader.onload = function(ev) { createBookWithData(name, desc, ev.target.result); };
        reader.readAsDataURL(file);
    } else {
        createBookWithData(name, desc, null);
    }
}

function compressAndSaveBook(bookId, name, desc, file) {
    if (file && file.size > 1024 * 1024) {
        compressImage(file, 400, 300, 0.6, function(compressedDataUrl) {
            saveBookWithCover(bookId, name, desc, compressedDataUrl);
        });
    } else if (file) {
        var reader = new FileReader();
        reader.onload = function(ev) { saveBookWithCover(bookId, name, desc, ev.target.result); };
        reader.readAsDataURL(file);
    } else {
        saveBookWithCover(bookId, name, desc, null);
    }
}

function saveBookWithCover(bookId, name, desc, coverDataUrl) {
    var book = getBookById(bookId);
    if (!book) return;
    book.title = name;
    book.desc = desc;
    if (coverDataUrl) book.cover = coverDataUrl;
    saveAllData();
    renderBooks();
    var tabId = "book_" + bookId;
    for (var i = 0; i < openTabs.length; i++) {
        if (openTabs[i].id === tabId) {
            openTabs[i].title = name;
            renderTabs();
            break;
        }
    }
    closeBookEditPanel();
    alert("书籍已更新");
}

// 新建书籍面板函数
function openNewBookPanelV2() {
    var panel = document.getElementById('newBookSlidePanelV2');
    if (panel) panel.classList.add('open');
    document.getElementById('newBookNameV2').value = '';
    document.getElementById('newBookDescV2').value = '';
    document.getElementById('newBookCoverV2').value = '';
    document.getElementById('newBookCoverPreviewV2').style.backgroundImage = '';
}

function closeNewBookPanelV2() {
    var panel = document.getElementById('newBookSlidePanelV2');
    if (panel) panel.classList.remove('open');
}

function createNewBookV2() {
    var name = document.getElementById('newBookNameV2').value.trim();
    if (!name) { alert('请输入书籍名称'); return; }
    var desc = document.getElementById('newBookDescV2').value;
    var coverFile = document.getElementById('newBookCoverV2').files[0];
    compressAndCreateBook(name, desc, coverFile);
}

function createBookWithData(name, desc, cover) {
    var defaultGroup = groups.find(function(g) { return g.name === '默认分组'; });
    var groupId = defaultGroup ? defaultGroup.id : 'default';
    var newChapter = new Chapter(Date.now(), '第一章', '<p></p>');
    var newVolume = new Volume(Date.now(), '第一卷', [newChapter]);
    var newBook = new Book(Date.now(), name, [newVolume]);
    newBook.groupId = groupId;
    newBook.desc = desc || '';
    if (cover) newBook.cover = cover;
    
    // 获取稿费设置
    var rateInput = document.getElementById('newBookRateV2');
    var targetInput = document.getElementById('newBookTargetV2');
    newBook.ratePerThousand = rateInput ? parseFloat(rateInput.value) || 10 : 10;
    newBook.targetWords = targetInput ? parseInt(targetInput.value) * 10000 || 200000 : 200000;
    
    books.push(newBook);
    saveAllData();
    renderBooks();
    closeNewBookPanelV2();
    openBookTab(newBook.id);
    alert('书籍《' + name + '》创建成功');
}

// 新建分组面板函数
function openNewGroupPanelV2() {
    var panel = document.getElementById('newGroupSlidePanelV2');
    if (panel) panel.classList.add('open');
    document.getElementById('newGroupNameV2').value = '';
}

function closeNewGroupPanelV2() {
    var panel = document.getElementById('newGroupSlidePanelV2');
    if (panel) panel.classList.remove('open');
}

function createNewGroupV2() {
    var name = document.getElementById('newGroupNameV2').value.trim();
    if (!name) { alert('请输入分组名称'); return; }
    groups.push({ id: Date.now().toString(), name: name });
    saveGroups();
    renderBooks();
    closeNewGroupPanelV2();
    alert('分组"' + name + '"创建成功');
}
