name: 📦 自动打包

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-windows:
    name: 🪟 Windows 打包
    runs-on: windows-latest
    steps:
      - name: 📥 拉取代码
        uses: actions/checkout@v4

      - name: 🔧 安装 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: 📦 安装依赖
        run: npm install

      - name: 🚀 打包 Windows 版本
        run: npm run build-win

      - name: 📤 上传安装包
        uses: actions/upload-artifact@v4
        with:
          name: WritingPanelSystem-Windows
          path: dist/

      - name: 📤 上传到 Release
        uses: softprops/action-gh-release@v1
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            dist/*.exe
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-mac:
    name: 🍎 macOS 打包
    runs-on: macos-latest
    steps:
      - name: 📥 拉取代码
        uses: actions/checkout@v4

      - name: 🔧 安装 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: 📦 安装依赖
        run: npm install

      - name: 🚀 打包 macOS 版本
        run: npm run build-mac

      - name: 📤 上传安装包
        uses: actions/upload-artifact@v4
        with:
          name: WritingPanelSystem-macOS
          path: dist/

      - name: 📤 上传到 Release
        uses: softprops/action-gh-release@v1
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            dist/*.dmg
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}