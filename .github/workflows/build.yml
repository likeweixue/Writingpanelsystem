name: 📦 自动打包

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-windows:
    name: 🪟 Windows 打包
    runs-on: windows-latest
    steps:
      - name: 📥 拉取代码
        uses: actions/checkout@v4

      - name: 🔧 安装 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: 📦 安装依赖
        run: |
          npm install
          npm install electron-builder --save-dev

      - name: 🚀 打包 Windows
        run: npm run build-win

      - name: 📤 上传
        uses: actions/upload-artifact@v4
        with:
          name: WritingPanelSystem-Windows
          path: dist/

  build-mac:
    name: 🍎 macOS 打包
    runs-on: macos-latest
    steps:
      - name: 📥 拉取代码
        uses: actions/checkout@v4

      - name: 🔧 安装 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: 📦 安装依赖
        run: |
          npm install
          npm install electron-builder --save-dev

      - name: 🚀 打包 macOS
        run: npm run build-mac

      - name: 📤 上传
        uses: actions/upload-artifact@v4
        with:
          name: WritingPanelSystem-macOS
          path: dist/